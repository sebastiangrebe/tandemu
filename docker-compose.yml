services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tandemu
      POSTGRES_PASSWORD: tandemu
      POSTGRES_DB: tandemu
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tandemu"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    # No public ports — only reachable via Docker internal network
    # Backend proxies all external telemetry through /api/telemetry/ingest
    environment:
      CLICKHOUSE_ENDPOINT: ${CLICKHOUSE_ENDPOINT:-tcp://clickhouse:9000?dial_timeout=10s&compress=lz4}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-otel}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/sebastiangrebe/tandemu-backend:${TANDEMU_VERSION:-latest}
    labels:
      - "com.centurylinklabs.watchtower.scope=tandemu"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://tandemu:tandemu@postgres:5432/tandemu
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: dev-secret-change-me
      APP_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OPENMEMORY_HOST: mem0
      OPENMEMORY_PORT: 8000
      WATCHTOWER_API_URL: http://watchtower:8080
      WATCHTOWER_API_TOKEN: ${WATCHTOWER_TOKEN:-tandemu-update}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/sebastiangrebe/tandemu-frontend:${TANDEMU_VERSION:-latest}
    labels:
      - "com.centurylinklabs.watchtower.scope=tandemu"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

  mem0:
    image: ghcr.io/sebastiangrebe/tandemu-mem0:${TANDEMU_VERSION:-latest}
    labels:
      - "com.centurylinklabs.watchtower.scope=tandemu"
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEM0_TELEMETRY: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mem0
      POSTGRES_USER: tandemu
      POSTGRES_PASSWORD: tandemu
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:-tandemu-update}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_POLL_INTERVAL: 86400
      WATCHTOWER_SCOPE: tandemu
    labels:
      - "com.centurylinklabs.watchtower.scope=tandemu"
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
