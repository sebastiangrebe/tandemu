name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    # Only push images on main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          build-args: APP_VERSION=${{ steps.meta.outputs.sha_short }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tandemu-backend:latest
            ghcr.io/${{ github.repository_owner }}/tandemu-backend:sha-${{ steps.meta.outputs.sha_short }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          build-args: APP_VERSION=${{ steps.meta.outputs.sha_short }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tandemu-frontend:latest
            ghcr.io/${{ github.repository_owner }}/tandemu-frontend:sha-${{ steps.meta.outputs.sha_short }}

      - name: Build and push mem0
        uses: docker/build-push-action@v6
        with:
          context: ./docker/mem0
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tandemu-mem0:latest
            ghcr.io/${{ github.repository_owner }}/tandemu-mem0:sha-${{ steps.meta.outputs.sha_short }}
